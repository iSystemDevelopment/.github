name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then
            npm ci
          else
            echo "No package.json — skipping Node CI for this repo."
            exit 0
          fi

      - name: Lint
        run: |
          if [ -f package.json ] && npm run 2>/dev/null | grep -q " lint"; then
            npm run lint
          else
            echo "No lint script — skipping."
          fi

      - name: Test
        run: |
          if [ -f package.json ] && npm run 2>/dev/null | grep -q " test"; then
            npm test -- --ci 2>/dev/null || npm test
          else
            echo "No test script — skipping."
          fi

      - name: Build
        run: |
          if [ -f package.json ] && npm run 2>/dev/null | grep -q " build"; then
            npm run build
          else
            echo "No build script — skipping."
          fi
